name: ci

# Gate every PR on typecheck + tests + build. The dashboard ran 12 PRs
# without any CI gate; this is the bar going forward.
#
# Test runner: vitest. The api.ts smoke suite catches wire-shape drift
# between the bot's REST surface and the dashboard's TS interfaces (the
# kind of drift that landed today between #14 and #17 — id type, count
# nullability) on PR open.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        # The build is the third gate after typecheck + tests — catches
        # `import.meta.env` issues, missing assets, and bundler-time
        # regressions that typecheck doesn't.
        run: npm run build
