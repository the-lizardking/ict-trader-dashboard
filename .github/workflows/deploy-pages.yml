name: Deploy PWA widget to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'static/pwa/**'
      - 'functions/**'
      - '_redirects'
      - 'vercel.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Publish to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy .
            --project-name=ict-trader-widget
            --branch=main
            --commit-dirty=true
