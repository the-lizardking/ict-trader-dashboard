name: Deploy PWA widget to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'static/pwa/**'
      - 'functions/**'
      - '_redirects'
      - 'vercel.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Publish to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail fast if the secrets are missing or named differently than
      # CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID. Length-only echo
      # so we never leak the token value to logs.
      - name: Verify Cloudflare secrets are present
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is empty or missing on this repo."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is empty or missing on this repo."
            exit 1
          fi
          echo "Secrets present: token length=${#CLOUDFLARE_API_TOKEN}, account_id length=${#CLOUDFLARE_ACCOUNT_ID}"

      # `wrangler pages deploy` auto-creates the project on first run
      # if --project-name doesn't exist on the account. Credentials must
      # be passed as env vars; the action's apiToken/accountId inputs
      # are no longer honored in current wrangler-action releases.
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          command: >-
            pages deploy .
            --project-name=ict-trader-widget
            --branch=main
            --commit-dirty=true
